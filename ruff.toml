target-version = "py313"
extend-exclude = [
    "check_*.py",
    "test_proxy*.py",
    "test_greenlet.py",
]

[lint]
ignore = ["E402"]

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "S",   # flake8-bandit security checks
]

[lint.per-file-ignores]
# Global: Cyrillic in Russian bot + long docstrings/prompts — legitimate
# S311: non-crypto random — sampling/shuffle/jitter, not key generation
# S324: MD5/SHA1 — content dedup/fingerprinting, not password hashing
# S603: subprocess — false positive; all use shell=False + shlex.split()
"src/**/*.py" = ["RUF001", "RUF002", "RUF003", "SIM102", "RUF012", "S311", "S324", "S603"]

# Bot layer: str+Enum (aiogram) + best-effort API error handling + S110 cleanup
"src/bot/**/*.py" = ["UP042", "SIM105", "S110", "E501"]

# Specific files: pre-existing patterns documented as intentional
"src/core/intelligence/soul_blocks.py" = ["RUF012", "E501"]
"src/core/intelligence/agent.py" = ["E501"]
"src/core/connectors/site_connectors.py" = ["E501"]
"src/config.py" = ["E501"]
"src/core/actions/mcp_connectors.py" = ["E501"]
"src/core/actions/mcp_youtube.py" = ["E501"]
"src/core/memory/memory_health.py" = ["E501"]
"src/core/actions/mcp_*.py" = ["SIM105"]
"src/core/actions/mcp_playwright.py" = ["RUF006"]
"src/core/avito/service.py" = ["SIM105"]
"src/core/avito/deal_score.py" = ["SIM108"]
"src/core/context/context_offload.py" = ["SIM113"]
"src/core/memory/episodic.py" = ["B005"]
"src/core/intelligence/maestro.py" = ["SIM105", "E501"]
"src/core/intelligence/llm_response_cache.py" = ["SIM103"]
"src/db/session.py" = ["B018", "E501"]
"src/core/rag/deep_research_pipeline.py" = ["E501"]  # GFM Markdown formatting
"src/llm/router.py" = ["F401", "B007", "SIM105"]
"src/llm/provider_manager.py" = ["SIM103"]
"src/bot/classifier.py" = ["F401"]
"src/bot/handlers/stats_cmd.py" = ["F401"]
"src/bot/handlers/settings.py" = ["F401"]
"src/core/humanizer/__init__.py" = ["F401"]
"src/core/memory/memory_queue.py" = ["F401"]
"src/bot/handlers/free_text_exec.py" = ["RUF006"]
"src/core/avito/proxy_rotator.py" = ["RUF006"]
"src/core/humanizer/humanizer.py" = ["RUF006"]
"src/core/memory/conversation_context.py" = ["RUF006"]
"src/bot/handlers/free_text_pipeline.py" = ["RUF006"]  # fire-and-forget session logging
"src/main.py" = ["RUF006", "S110", "SIM105"]
"tests/*.py" = ["S101"]

# exec()/eval() — легитимно: выполняются после строгой AST-валидации
# (whitelist узлов) и в изолированном namespace, без доступа к файловой системе.
# S102 — exec(), S307 — eval().
"src/core/actions/sdd_executor.py" = ["S102"]
"src/core/actions/mcp_calculator.py" = ["S307"]

# S105 — hardcoded password string. False positive: "Bearer" prefixes in OAuth
# Authorization headers are not secrets; the actual tokens come from env/file.
"src/core/actions/mcp_oauth.py" = ["S105"]

# ── S-rule exceptions (pre-existing, legitimate patterns) ──
# S110: try-except-pass — best-effort cleanup (e.g., cache.pop(), .discard()).
# Logging every failed cleanup would spam logs; contextlib.suppress is equivalent.
# Files with S110 are listed individually to avoid blanket suppression.
"src/core/memory/**/*.py" = ["S110"]
"src/core/cache/**/*.py" = ["S110"]
"src/core/scheduling/**/*.py" = ["S110"]
"src/core/intelligence/**/*.py" = ["S110"]
"src/userbot/**/*.py" = ["S110"]

# S110: try-except-pass — legitimate in these directories for best-effort cleanup
"src/core/rag/**/*.py" = ["S110"]
"src/db/repos/*.py" = ["S110"]
"src/core/actions/**/*.py" = ["S110"]
"src/core/agents/**/*.py" = ["S110"]
"src/core/avito/**/*.py" = ["S110"]
"src/core/contacts/**/*.py" = ["S110"]
"src/core/infra/**/*.py" = ["S110"]
"src/core/reasoning/**/*.py" = ["S110"]
"src/llm/**/*.py" = ["S110"]

# S-rule exceptions for specific files with documented legitimate usage
"src/core/actions/mcp_file_analyzer.py" = ["S314"]   # xml.etree — internal xml, no XXE risk
"src/core/actions/mcp_network.py" = ["S310"]          # urlopen with validated URLs only
"src/core/security/ssrf_guard.py" = ["S104"]          # 0.0.0.0 binding for SSRF callback detection
"src/core/connectors/http.py" = ["B904"]               # raise in except without from — pre-existing
