name: Security Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit (JSON output)
        id: audit
        run: |
          # --desc=on includes vulnerability descriptions
          pip-audit \
            --requirement requirements.txt \
            --format=json \
            --desc=on \
            --strict \
            | tee pip-audit-report.json
        continue-on-error: true

      - name: Filter HIGH/CRITICAL CVEs
        id: filter
        if: ${{ steps.audit.outcome != 'success' }}
        run: |
          python -c "
          import json, sys
          with open('pip-audit-report.json') as f:
              data = json.load(f)

          high_critical = []
          for vuln in data.get('dependencies', []):
              for v in vuln.get('vulns', []):
                  severity = v.get('severity', '').upper()
                  # pip-audit reports aliases like 'PYSEC-...' or CVEs like 'CVE-...'
                  # We check aliases for CVE- patterns and severity
                  aliases = v.get('aliases', [])
                  is_cve = any(a.startswith('CVE-') for a in aliases)
                  is_high_critical = severity in ('HIGH', 'CRITICAL')
                  if is_cve and is_high_critical:
                      high_critical.append({
                          'package': vuln.get('name', 'unknown'),
                          'version': vuln.get('version', '?'),
                          'id': aliases[0] if aliases else v.get('id', 'unknown'),
                          'description': v.get('description', 'no description'),
                      })

          if high_critical:
              # Write markdown report for the issue body
              lines = ['## pip-audit: HIGH/CRITICAL CVE findings', '']
              lines.append(f'Found {len(high_critical)} HIGH/CRITICAL CVEs in dependencies.')
              lines.append('')
              for item in high_critical:
                  lines.append(f'- **{item[\"package\"]}** {item[\"version\"]}: {item[\"id\"]}')
                  lines.append(f'  {item[\"description\"]}')
              lines.append('')
              lines.append('Review and upgrade affected packages ASAP.')
              with open('cve-report.md', 'w') as out:
                  out.write('\n'.join(lines))
              print(f'::set-output name=has_cves::true')
          else:
              print('::set-output name=has_cves::false')
          "

      - name: Create issue for HIGH/CRITICAL CVEs
        if: ${{ steps.filter.outputs.has_cves == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('cve-report.md', 'utf8');

            // Check for existing open issues with the same title to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security']
            });

            const title = '⚠️ pip-audit: HIGH/CRITICAL CVEs detected';
            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: report
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: report,
                labels: ['security']
              });
              console.log('Created new security issue');
            }
